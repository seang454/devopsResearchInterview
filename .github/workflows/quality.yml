name: Quality

on:
  pull_request:
  push:
    branches: [master, main]

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - root: terraform/infrastructure
            component: terraform/infrastructure/live/dev/asia-southeast1/gcp-vm
          - root: terraform/k8s_infrastructure
            component: terraform/k8s_infrastructure/live/dev/asia-southeast1/kubespray-k8s
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.4"
      - name: Check formatting
        run: terraform -chdir="${{ matrix.root }}" fmt -check -recursive
      - name: Create validation SSH key placeholder
        run: mkdir -p "$HOME/.ssh" && touch "$HOME/.ssh/id_rsa.pub"
      - name: Initialize without backend
        run: terraform -chdir="${{ matrix.component }}" init -backend=false
      - name: Validate
        run: terraform -chdir="${{ matrix.component }}" validate
      - uses: terraform-linters/setup-tflint@v5
        with:
          tflint_version: v0.58.1
      - name: Run TFLint
        run: tflint --chdir="${{ matrix.component }}"

  ansible:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/ansible_service_config
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint dependencies
        run: pip install "ansible-core==2.18.6" "ansible-lint==25.5.0"
      - name: Install Ansible collections
        run: ansible-galaxy collection install -r collections/requirements.yml
      - name: Lint first-party Ansible
        run: ansible-lint playbooks roles

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Scan first-party Terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          quiet: true
          skip_path: terraform/ansible_kubespray_k8s/kubespray
