name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      stack:
        description: Stack to apply
        required: true
        type: choice
        options:
          - services
          - kubernetes

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: dev
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.4"
      - name: Select stack
        shell: bash
        run: |
          if [[ "${{ inputs.stack }}" == "services" ]]; then
            echo "COMPONENT=terraform/infrastructure/live/dev/asia-southeast1/gcp-vm" >> "$GITHUB_ENV"
            echo "STATE_PREFIX=infrastructure/dev/asia-southeast1/gcp-vm" >> "$GITHUB_ENV"
          else
            echo "COMPONENT=terraform/k8s_infrastructure/live/dev/asia-southeast1/kubespray-k8s" >> "$GITHUB_ENV"
            echo "STATE_PREFIX=k8s-infrastructure/dev/asia-southeast1/kubespray-k8s" >> "$GITHUB_ENV"
          fi
      - name: Create protected service variable file
        if: inputs.stack == 'services'
        env:
          TFVARS_B64: ${{ secrets.SERVICES_TFVARS_B64 }}
        shell: bash
        run: printf '%s' "$TFVARS_B64" | base64 --decode > "$COMPONENT/terraform.tfvars"
      - name: Create protected Kubernetes variable file
        if: inputs.stack == 'kubernetes'
        env:
          TFVARS_B64: ${{ secrets.KUBERNETES_TFVARS_B64 }}
        shell: bash
        run: printf '%s' "$TFVARS_B64" | base64 --decode > "$COMPONENT/terraform.tfvars"
      - name: Initialize remote state
        run: terraform -chdir="$COMPONENT" init -backend-config="bucket=${{ secrets.GCP_STATE_BUCKET }}" -backend-config="prefix=$STATE_PREFIX"
      - name: Plan
        run: terraform -chdir="$COMPONENT" plan -out=tfplan
      - name: Apply approved plan
        run: terraform -chdir="$COMPONENT" apply -auto-approve tfplan
