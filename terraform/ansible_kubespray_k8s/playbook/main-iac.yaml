---
# ==========================================================================
# ansible_kubespray_k8s — main IAC playbook
#
# Prerequisites (run once before this playbook):
#   terraform apply   (inside k8s_infrastructure/live/dev/…/kubespray-k8s)
#   → writes kubespray/inventory/sample/inventory.ini automatically
#
# Run with:
#   just setup-iac
# ==========================================================================

# --------------------------------------------------------------------------
# 1. Wait for ALL nodes to be reachable via SSH
#    (GCP VMs can take 30-60 s after Terraform creates them)
# --------------------------------------------------------------------------
- name: Wait for control plane nodes to be reachable via SSH
  hosts: kube_control_plane
  gather_facts: false
  tasks:
    - name: Wait for SSH on control plane nodes
      ansible.builtin.wait_for_connection:
        delay: 15
        timeout: 300

- name: Wait for worker nodes to be reachable via SSH
  hosts: kube_node
  gather_facts: false
  tasks:
    - name: Wait for SSH on worker nodes
      ansible.builtin.wait_for_connection:
        delay: 15
        timeout: 300

# --------------------------------------------------------------------------
# 2. Fix SSH known_hosts permissions on the Ansible controller
# --------------------------------------------------------------------------
- name: Fix SSH known_hosts permissions on controller
  hosts: localhost
  become: false
  gather_facts: true
  tasks:
    - name: Ensure .ssh directory has correct permissions
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.ssh"
        state: directory
        mode: "0700"

    - name: Ensure known_hosts file exists with correct permissions
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.ssh/known_hosts"
        state: touch
        mode: "0644"

# --------------------------------------------------------------------------
# 3. Set up Kubespray virtualenv and write the runner script
#    (Justfile calls the runner directly for live terminal output)
# --------------------------------------------------------------------------
- name: Set up Kubespray virtualenv and write runner script
  hosts: localhost
  become: false
  gather_facts: true
  tasks:
    - name: Verify cluster.yml exists inside kubespray dir
      ansible.builtin.stat:
        path: "{{ kubespray_dir }}/cluster.yml"
      register: cluster_yml_stat

    - name: Fail if cluster.yml not found
      ansible.builtin.fail:
        msg: >
          cluster.yml not found at {{ kubespray_dir }}/cluster.yml.
          Make sure the kubespray submodule is initialised:
          git submodule update --init --recursive
      when: not cluster_yml_stat.stat.exists

    - name: Verify Terraform-generated inventory exists
      ansible.builtin.stat:
        path: "{{ kubespray_inventory }}"
      register: kubespray_inv_stat

    - name: Fail if Terraform inventory is missing
      ansible.builtin.fail:
        msg: >
          Kubespray inventory not found at {{ kubespray_inventory }}.
          Run 'terraform apply' inside k8s_infrastructure first so Terraform
          can write the inventory with the real VM IPs.
      when: not kubespray_inv_stat.stat.exists

    - name: Show kubespray inventory content (verify IPs look correct)
      ansible.builtin.command:
        cmd: cat {{ kubespray_inventory }}
      register: inv_content
      changed_when: false

    - name: Display kubespray inventory
      ansible.builtin.debug:
        msg: "{{ inv_content.stdout_lines }}"

    - name: Create kubespray virtualenv
      ansible.builtin.command:
        cmd: python3 -m venv {{ kubespray_venv }}
        creates: "{{ kubespray_venv }}/bin/activate"

    - name: Install kubespray requirements into venv
      ansible.builtin.pip:
        requirements: "{{ kubespray_requirements }}"
        virtualenv: "{{ kubespray_venv }}"
        virtualenv_python: python3

    - name: Verify ansible version inside kubespray venv
      ansible.builtin.command:
        cmd: "{{ kubespray_venv }}/bin/ansible --version"
      register: ansible_ver
      changed_when: false

    - name: Show kubespray ansible version
      ansible.builtin.debug:
        msg: "Kubespray ansible: {{ ansible_ver.stdout_lines[0] }}"

    # -----------------------------------------------------------------------
    # Write the runner shell script.
    # Justfile calls this script directly so output streams live to terminal.
    # -----------------------------------------------------------------------
    - name: Write kubespray runner script
      ansible.builtin.copy:
        dest: "{{ kubespray_runner }}"
        mode: "0755"
        content: |
          #!/bin/bash
          set -euo pipefail

          export PATH="{{ kubespray_venv }}/bin:$PATH"
          export ANSIBLE_FORCE_COLOR=true
          export ANSIBLE_STDOUT_CALLBACK=yaml
          export PYTHONUNBUFFERED=1
          export ANSIBLE_LOCAL_TEMP=/tmp
          export TMPDIR=/tmp

          cd {{ kubespray_dir }}

          echo "=========================================="
          echo "  Kubespray HA cluster deployment starting"
          echo "  Inventory: {{ kubespray_inventory }}"
          echo "  Log:       {{ kubespray_log }}"
          echo "=========================================="

          {{ kubespray_venv }}/bin/ansible-playbook \
            -b -v \
            -i {{ kubespray_inventory }} \
            cluster.yml 2>&1 | tee {{ kubespray_log }}

          EXIT_CODE=${PIPESTATUS[0]}

          if [ $EXIT_CODE -eq 0 ]; then
            echo ""
            echo "✅ Kubernetes HA cluster deployed successfully!"
          else
            echo ""
            echo "❌ Kubespray deployment FAILED (exit code: $EXIT_CODE)"
            exit $EXIT_CODE
          fi

    - name: "✅ Runner script ready — Justfile will execute it next"
      ansible.builtin.debug:
        msg: "Runner written to {{ kubespray_runner }} — Kubespray will start with live output shortly"

# --------------------------------------------------------------------------
# 4. Install zsh on control plane nodes
# --------------------------------------------------------------------------
- name: Install zsh on control plane nodes
  hosts: kube_control_plane
  gather_facts: false
  tasks:
    - name: Wait for SSH before zsh setup
      ansible.builtin.wait_for_connection:
        delay: 5
        timeout: 120

    - name: Copy zsh.sh to control plane nodes
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../zsh/zsh.sh"
        dest: /tmp/zsh.sh
        mode: "0755"

    - name: Run zsh.sh on control plane nodes
      ansible.builtin.shell:
        cmd: /tmp/zsh.sh
      become: true
      args:
        executable: /bin/bash
      environment:
        DEBIAN_FRONTEND: noninteractive
      async: 600
      poll: 15
      register: zsh_cp_output

    - name: Show zsh.sh output (control plane)
      ansible.builtin.debug:
        msg: "{{ zsh_cp_output.stdout_lines }}"

# --------------------------------------------------------------------------
# 5. Install zsh on worker nodes
# --------------------------------------------------------------------------
- name: Install zsh on worker nodes
  hosts: kube_node
  gather_facts: false
  tasks:
    - name: Wait for SSH before zsh setup
      ansible.builtin.wait_for_connection:
        delay: 5
        timeout: 120

    - name: Copy zsh.sh to worker nodes
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../zsh/zsh.sh"
        dest: /tmp/zsh.sh
        mode: "0755"

    - name: Run zsh.sh on worker nodes
      ansible.builtin.shell:
        cmd: /tmp/zsh.sh
      become: true
      args:
        executable: /bin/bash
      environment:
        DEBIAN_FRONTEND: noninteractive
      async: 600
      poll: 15
      register: zsh_worker_output

    - name: Show zsh.sh output (workers)
      ansible.builtin.debug:
        msg: "{{ zsh_worker_output.stdout_lines }}"
