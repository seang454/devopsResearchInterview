- name: Create GCP venv and install dependencies
  pip:
    name:
      - requests
      - google-auth
    virtualenv: "{{ gcp_venv }}"
    virtualenv_command: python3 -m venv

- name: Create kubespray virtualenv
  ansible.builtin.command:
    cmd: python3 -m venv {{ kubespray_venv }}
    creates: "{{ kubespray_venv }}/bin/activate"

- name: Upgrade pip in kubespray venv
  ansible.builtin.pip:
    name: pip
    state: latest
    virtualenv: "{{ kubespray_venv }}"

- name: Install kubespray requirements into venv
  ansible.builtin.pip:
    requirements: "{{ kubespray_requirements }}"
    virtualenv: "{{ kubespray_venv }}"
