- name: Update apt cache
  apt:
    update_cache: yes

- name: Install system packages
  apt:
    name:
      - python3-pip
      - python3-venv
      - python3-dev
      - build-essential
      - git
      - curl
    state: present

- name: Install google.cloud ansible collection
  ansible.builtin.command:
    cmd: ansible-galaxy collection install google.cloud -p {{ ansible_collections_path }} --force
  become: false
  changed_when: true
