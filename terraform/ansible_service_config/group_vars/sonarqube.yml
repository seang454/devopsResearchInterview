---
# Real SonarQube values loaded by Ansible.
# Domain is generated by Terraform in group_vars/sonarqube/terraform_domains.yml.

# Set in group_vars/all.yml:
# certbot_email: "pengseangsim@210.gmail.com"

sonarqube_enable_https: true
certbot_staging: true
sonarqube_web_port: 9000

# Secret is loaded from group_vars/sonarqube/vault.yml.
sonarqube_database_password: "{{ vault_sonarqube_database_password }}"
