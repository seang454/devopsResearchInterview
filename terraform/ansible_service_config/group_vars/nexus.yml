---
# Real Nexus values loaded by Ansible.
# Domains are generated by Terraform in group_vars/nexus/terraform_domains.yml.

# Set in group_vars/all.yml:
# certbot_email: "pengseangsim@210.gmail.com"

nexus_enable_https: true
certbot_staging: true

# After the first login, store the changed password in group_vars/nexus/vault.yml.
nexus_admin_password: "{{ vault_nexus_admin_password | default('') }}"
