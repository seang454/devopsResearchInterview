---
# Real DefectDojo values loaded by Ansible.
# Domains are generated by Terraform in group_vars/defectdojo/terraform_domains.yml.

# Set in group_vars/all.yml:
# certbot_email: "pengseangsim@210.gmail.com"

defectdojo_enable_https: true
certbot_staging: true

# Secrets are loaded from group_vars/defectdojo/vault.yml.
defectdojo_db_password: "{{ vault_defectdojo_db_password }}"
defectdojo_secret_key: "{{ vault_defectdojo_secret_key }}"
defectdojo_admin_password: "{{ vault_defectdojo_admin_password }}"
defectdojo_admin_email: "pengseangsim@210.gmail.com"
