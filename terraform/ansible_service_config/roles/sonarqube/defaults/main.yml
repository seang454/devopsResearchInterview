---
sonarqube_version: "25.2.0.102705"
sonarqube_install_dir: /opt/sonarqube
# Nginx is the public entry point, so SonarQube listens only on this VM.
sonarqube_web_host: "127.0.0.1"
sonarqube_web_port: 9000
sonarqube_user: sonarqube
sonarqube_group: sonarqube

sonarqube_domain: "sonarqube.example.com"
sonarqube_enable_https: true
certbot_email: "admin@example.com"
certbot_staging: false
certbot_redirect_http_to_https: true
sonarqube_certbot_verify_renewal: false

sonarqube_database_name: sonarqube
sonarqube_database_user: sonaruser
sonarqube_database_password: "sonarpassword@12345"
sonarqube_database_host: localhost
sonarqube_database_port: 5432
