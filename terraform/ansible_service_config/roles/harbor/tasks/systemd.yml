---
- name: Template harbor.service unit
  ansible.builtin.template:
    src: harbor.service.j2
    dest: "/etc/systemd/system/{{ harbor_systemd_service_name }}.service"
    mode: "0644"
  notify: reload systemd

- name: Flush handlers so the new unit file is picked up immediately
  ansible.builtin.meta: flush_handlers

- name: Enable and start the harbor systemd service
  ansible.builtin.systemd:
    name: "{{ harbor_systemd_service_name }}"
    enabled: true
    state: started
