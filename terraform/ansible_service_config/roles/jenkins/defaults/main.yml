---
jenkins_domain: "jenkins.example.com"
certbot_email: "admin@example.com"
jenkins_enable_https: true
certbot_staging: false
certbot_redirect_http_to_https: true
jenkins_certbot_verify_renewal: false

jenkins_network: jenkins
jenkins_image_name: custom-jenkins-blueocean
jenkins_image_version: "lts-jdk21"
jenkins_glab_version: "1.59.2"

jenkins_container_name: jenkins-blueocean
jenkins_data_volume: jenkins-data
jenkins_certs_volume: jenkins-docker-certs

jenkins_http_port: 8080
jenkins_agent_port: 50000
jenkins_dind_port: 2376

# Bind Docker-published ports locally because Nginx is the public entry point.
# To use remote inbound agents, set jenkins_agent_bind_address to "0.0.0.0"
# and allow port 50000 from only the agent CIDRs in Terraform.
jenkins_http_bind_address: "127.0.0.1"
jenkins_agent_bind_address: "127.0.0.1"
jenkins_dind_bind_address: "127.0.0.1"
