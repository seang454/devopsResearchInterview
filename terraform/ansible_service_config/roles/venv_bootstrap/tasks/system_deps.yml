---
- name: Validate supported OS family
  ansible.builtin.assert:
    that:
      - ansible_facts["os_family"] == "Debian"
    fail_msg: "ansible_service_config currently supports Debian/Ubuntu targets."

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Remove conflicting Docker packages before installing Ubuntu Docker packages
  ansible.builtin.apt:
    name:
      - containerd
      - containerd.io
      - docker-ce
      - docker-ce-cli
      - docker-buildx-plugin
      - docker-compose-plugin
    state: absent
    purge: true
    autoremove: true
  when:
    - "'docker.io' in service_config_system_packages"

- name: Install shared service environment packages
  ansible.builtin.apt:
    name: "{{ service_config_system_packages }}"
    state: present

- name: Ensure Docker service is running when installed
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
  register: docker_service_result
  failed_when: false
  when:
    - service_config_start_docker | bool
    - "'docker.io' in service_config_system_packages"
    - ansible_service_mgr == 'systemd'

- name: Warn when Docker service could not be started
  ansible.builtin.debug:
    msg: >-
      Docker was installed but the service could not be started automatically.
      Review 'systemctl status docker' and 'journalctl -xeu docker' on the target host.
  when:
    - docker_service_result is defined
    - docker_service_result.failed | default(false)
