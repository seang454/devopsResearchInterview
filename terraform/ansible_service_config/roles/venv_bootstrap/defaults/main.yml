---
# Central environment role for ansible_service_config.
# Put shared OS packages, Python libraries, and external CLI tooling here.

service_config_venv: /opt/service-config-venv
service_config_set_ansible_python_interpreter: false

service_config_base_system_packages:
  - acl
  - apt-transport-https
  - ca-certificates
  - certbot
  - curl
  - git
  - gnupg
  - gpg
  - lsb-release
  - nginx
  - python3
  - python3-apt
  - python3-cryptography
  - python3-certbot-nginx
  - python3-dev
  - python3-pip
  - python3-psycopg2
  - python3-requests
  - python3-venv
  - python3-yaml
  - snapd
  - software-properties-common
  - tar
  - unzip
  - wget

service_config_extra_system_packages: []
service_config_system_packages: "{{ (service_config_base_system_packages + service_config_extra_system_packages) | unique | list }}"

service_config_python_bootstrap_packages:
  - pip
  - setuptools
  - wheel

service_config_base_python_packages:
  - ansible
  - cryptography
  - psycopg2-binary
  - PyYAML
  - requests

service_config_extra_python_packages: []
service_config_python_packages: "{{ (service_config_base_python_packages + service_config_extra_python_packages) | unique | list }}"

service_config_link_ansible_commands: true
service_config_start_docker: false

service_config_install_glab: false
service_config_glab_version: latest
service_config_glab_install_dir: /usr/local/bin
service_config_glab_arch_map:
  x86_64: amd64
  amd64: amd64
  aarch64: arm64
  arm64: arm64
