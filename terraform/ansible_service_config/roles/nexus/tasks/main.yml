  retries: 5
  delay: 10
  until: create_helm_blob.status | default(0) in [200, 201, 204]
  register: create_helm_blob
  no_log: true

- name: Update Helm blob store
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ nexus_port }}/service/rest/v1/blobstores/file/{{ nexus_helm_blob }}"
    method: PUT
    user: "{{ nexus_admin_username }}"
    password: "{{ nexus_api_password }}"
    force_basic_auth: true
    body_format: json
    body:
      name: "{{ nexus_helm_blob }}"
      path: "{{ nexus_helm_blob }}"
    status_code: [200, 201, 204]
  when: nexus_helm_blob in (existing_blobstores.json | map(attribute='name') | list)
  retries: 5
  delay: 10
  until: update_helm_blob.status | default(0) in [200, 201, 204]
  register: update_helm_blob
  no_log: true

# ---- Docker hosted repository ----
- name: Create Docker hosted repository
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ nexus_port }}/service/rest/v1/repositories/docker/hosted"
    method: POST
    user: "{{ nexus_admin_username }}"
    password: "{{ nexus_api_password }}"
    force_basic_auth: true
    body_format: json
    body:
      name: "{{ nexus_docker_repo_name }}"
      online: true
      storage:
        blobStoreName: "{{ nexus_docker_blob }}"
        strictContentTypeValidation: true
        writePolicy: ALLOW
      docker:
        v1Enabled: false
        forceBasicAuth: true
        httpPort: 8082
    status_code: [200, 201, 204]
  when: nexus_docker_repo_name not in (existing_repos.json | map(attribute='name') | list)
  retries: 5
  delay: 10
  until: create_docker_repo.status | default(0) in [200, 201, 204]
  register: create_docker_repo
  no_log: true

- name: Update Docker hosted repository
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ nexus_port }}/service/rest/v1/repositories/docker/hosted/{{ nexus_docker_repo_name }}"
    method: PUT
    user: "{{ nexus_admin_username }}"
    password: "{{ nexus_api_password }}"
    force_basic_auth: true
    body_format: json
    body:
      name: "{{ nexus_docker_repo_name }}"
      online: true
      storage:
        blobStoreName: "{{ nexus_docker_blob }}"
        strictContentTypeValidation: true
        writePolicy: ALLOW
      docker:
        v1Enabled: false
        forceBasicAuth: true
        httpPort: 8082
    status_code: [200, 201, 204]
  when: nexus_docker_repo_name in (existing_repos.json | map(attribute='name') | list)
  retries: 5
  delay: 10
  until: update_docker_repo.status | default(0) in [200, 201, 204]
  register: update_docker_repo
  no_log: true

# ---- Helm hosted repository ----
- name: Create Helm hosted repository
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ nexus_port }}/service/rest/v1/repositories/helm/hosted"
    method: POST
    user: "{{ nexus_admin_username }}"
    password: "{{ nexus_api_password }}"
    force_basic_auth: true
    body_format: json
    body:
      name: "{{ nexus_helm_repo_name }}"
      online: true
      storage:
        blobStoreName: "{{ nexus_helm_blob }}"
        strictContentTypeValidation: true
        writePolicy: ALLOW
    status_code: [200, 201, 204]
  when: nexus_helm_repo_name not in (existing_repos.json | map(attribute='name') | list)
  retries: 5
  delay: 10
  until: create_helm_repo.status | default(0) in [200, 201, 204]
  register: create_helm_repo
  no_log: true

- name: Update Helm hosted repository
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ nexus_port }}/service/rest/v1/repositories/helm/hosted/{{ nexus_helm_repo_name }}"
    method: PUT
    user: "{{ nexus_admin_username }}"
    password: "{{ nexus_api_password }}"
    force_basic_auth: true
    body_format: json
    body:
      name: "{{ nexus_helm_repo_name }}"
