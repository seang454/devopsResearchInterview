        blobStoreName: "{{ nexus_helm_blob }}"
        strictContentTypeValidation: true
        writePolicy: ALLOW
    status_code: [200, 201, 204]
  when: nexus_helm_repo_name in (existing_repos.json | map(attribute='name') | list)
  retries: 5
  delay: 10
  until: update_helm_repo.status | default(0) in [200, 201, 204]
  register: update_helm_repo
  no_log: true
