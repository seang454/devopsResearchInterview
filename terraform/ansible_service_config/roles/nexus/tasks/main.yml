---
# ============================================================
# Role: nexus
# Purpose: Deploy Nexus Repository Manager via Docker on Machine03
#          Set up Docker blob store & Docker hosted repo
#          Set up Helm blob store & Helm hosted repo
#          Configure Nginx + HTTPS via Certbot
# ============================================================

- name: Validate Nexus HTTPS settings
  ansible.builtin.assert:
    that:
      - nexus_domain is defined
      - nexus_domain != "nexus.example.com"
      - nexus_docker_repo_domain is defined
      - nexus_docker_repo_domain != "docker.example.com"
      - certbot_email is defined
      - certbot_email != "admin@example.com"
    fail_msg: "Set nexus_domain, nexus_docker_repo_domain, and certbot_email before enabling Nexus HTTPS."
  when: nexus_enable_https | bool

- name: Ensure Nginx is started and enabled
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true
  become: true

# ---- Ensure ACME challenge webroot exists ----
- name: Ensure ACME challenge webroot exists
  ansible.builtin.file:
    path: /var/www/html
    state: directory
    mode: "0755"
  become: true

# ---- Nexus Nginx Virtual Hosts ----
- name: Deploy Nginx config for Nexus UI
  ansible.builtin.template:
    src: nexus_nginx.conf.j2
    dest: /etc/nginx/sites-available/nexus
    mode: "0644"
  become: true

- name: Deploy Nginx config for Nexus Docker Repo
  ansible.builtin.template:
    src: nexus_docker_nginx.conf.j2
    dest: /etc/nginx/sites-available/nexus-docker
    mode: "0644"
  become: true

- name: Enable Nexus Nginx sites
  ansible.builtin.file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop:
    - { src: /etc/nginx/sites-available/nexus,       dest: /etc/nginx/sites-enabled/nexus }
    - { src: /etc/nginx/sites-available/nexus-docker, dest: /etc/nginx/sites-enabled/nexus-docker }
  become: true

- name: Remove default Nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  become: true
  notify: Reload Nginx

- name: Flush handlers to reload Nginx before starting containers
  ansible.builtin.meta: flush_handlers

# ---- Docker Network ----
- name: Create Nexus Docker network
  community.docker.docker_network:
    name: "{{ nexus_network }}"
    state: present
  become: true

# ---- Optional Nexus data reset ----
- name: Stop and remove Nexus container when data reset is requested
  community.docker.docker_container:
    name: nexus
    state: absent
    force_kill: true
  become: true
  when: nexus_reset_data | bool

- name: Remove Nexus data Docker volume when data reset is requested
  community.docker.docker_volume:
    name: "{{ nexus_data_volume }}"
    state: absent
  become: true
  when: nexus_reset_data | bool

# ---- Nexus volume ----
- name: Create Nexus data Docker volume
  community.docker.docker_volume:
    name: "{{ nexus_data_volume }}"
    state: present
  become: true

# ---- Nexus container ----
- name: Run Nexus Repository Manager container
  community.docker.docker_container:
    name: nexus
    image: "{{ nexus_image }}"
    state: started
    restart_policy: unless-stopped
    networks:
      - name: "{{ nexus_network }}"
    volumes:
      - "{{ nexus_data_volume }}:/nexus-data"
    ports:
      - "{{ nexus_bind_address }}:{{ nexus_port }}:8081"
      - "{{ nexus_bind_address }}:{{ nexus_docker_port }}:8082"
    ulimits:
      - nofile:65536:65536
  become: true

# ---- Wait for Nexus to be ready ----
- name: Wait for Nexus to become available (can take 2-3 minutes)
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ nexus_port }}/service/rest/v1/status"
    method: GET
    status_code: 200
  register: nexus_status
  retries: 40
  delay: 15
  until: nexus_status.status == 200

- name: Wait additional time for Nexus authentication system to be ready
  ansible.builtin.pause:
    seconds: 30
  when: nexus_status.status == 200

# ---- Certbot SSL (runs after Nexus is ready to avoid 502) ----
- name: Check if SSL certificate already exists for Nexus UI
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ nexus_domain }}/fullchain.pem"
  register: cert_status_nexus
  when: nexus_enable_https | bool

- name: Inspect existing Nexus UI certificate issuer
  ansible.builtin.command:
    cmd: >-
      openssl x509
      -in /etc/letsencrypt/live/{{ nexus_domain }}/fullchain.pem
      -noout
      -issuer
  register: nexus_ui_cert_issuer
  changed_when: false
  failed_when: false
  when:
    - nexus_enable_https | bool
    - cert_status_nexus.stat.exists | default(false)

- name: Determine whether the Nexus UI certificate needs issuance
  ansible.builtin.set_fact:
    nexus_ui_cert_needs_issuance: >-
      {{
        not (cert_status_nexus.stat.exists | default(false))
        or nexus_ui_cert_issuer.rc | default(1) != 0
        or (
          certbot_staging | bool
          and not (
            "Let's Encrypt" in (nexus_ui_cert_issuer.stdout | default(''))
            or "Fake LE" in (nexus_ui_cert_issuer.stdout | default(''))
          )
        )
        or (
          not certbot_staging | bool
          and not (
            "Let's Encrypt" in (nexus_ui_cert_issuer.stdout | default(''))
            and "Fake LE" not in (nexus_ui_cert_issuer.stdout | default(''))
          )
        )
      }}
  when: nexus_enable_https | bool

- name: Obtain Let's Encrypt certificate for Nexus UI
  ansible.builtin.command:
    cmd: >
      certbot --nginx
      -d {{ nexus_domain }}
      --non-interactive
      --agree-tos
      --email {{ certbot_email }}
      {{ '--redirect' if certbot_redirect_http_to_https else '' }}
      {{ '--staging' if certbot_staging else '' }}
  become: true
  register: certbot_nexus_result
  changed_when: "'Certificate not yet due for renewal' not in certbot_nexus_result.stdout"
  failed_when:
    - certbot_nexus_result.rc != 0
    - "'Certificate not yet due for renewal' not in certbot_nexus_result.stdout"
  when:
    - nexus_enable_https | bool
    - nexus_ui_cert_needs_issuance | default(false) | bool

- name: Check if SSL certificate already exists for Docker repo domain
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ nexus_docker_repo_domain }}/fullchain.pem"
  register: cert_status_docker
  when: nexus_enable_https | bool

- name: Inspect existing Nexus Docker repo certificate issuer
  ansible.builtin.command:
    cmd: >-
      openssl x509
      -in /etc/letsencrypt/live/{{ nexus_docker_repo_domain }}/fullchain.pem
      -noout
      -issuer
  register: nexus_docker_cert_issuer
  changed_when: false
  failed_when: false
  when:
    - nexus_enable_https | bool
    - cert_status_docker.stat.exists | default(false)

- name: Determine whether the Nexus Docker repo certificate needs issuance
  ansible.builtin.set_fact:
    nexus_docker_cert_needs_issuance: >-
      {{
        not (cert_status_docker.stat.exists | default(false))
        or nexus_docker_cert_issuer.rc | default(1) != 0
        or (
          certbot_staging | bool
          and not (
            "Let's Encrypt" in (nexus_docker_cert_issuer.stdout | default(''))
            or "Fake LE" in (nexus_docker_cert_issuer.stdout | default(''))
          )
        )
        or (
          not certbot_staging | bool
          and not (
            "Let's Encrypt" in (nexus_docker_cert_issuer.stdout | default(''))
            and "Fake LE" not in (nexus_docker_cert_issuer.stdout | default(''))
          )
        )
      }}
  when: nexus_enable_https | bool

- name: Obtain Let's Encrypt certificate for Docker repo domain
  ansible.builtin.command:
    cmd: >
      certbot --nginx
      -d {{ nexus_docker_repo_domain }}
      --non-interactive
      --agree-tos
      --email {{ certbot_email }}
      {{ '--redirect' if certbot_redirect_http_to_https else '' }}
      {{ '--staging' if certbot_staging else '' }}
  become: true
  register: certbot_docker_repo_result
  changed_when: "'Certificate not yet due for renewal' not in certbot_docker_repo_result.stdout"
  failed_when:
    - certbot_docker_repo_result.rc != 0
    - "'Certificate not yet due for renewal' not in certbot_docker_repo_result.stdout"
  when:
    - nexus_enable_https | bool
    - nexus_docker_cert_needs_issuance | default(false) | bool

- name: Ensure Certbot auto-renewal timer is enabled
  ansible.builtin.systemd:
    name: certbot.timer
    enabled: true
    state: started
  become: true
  when: nexus_enable_https | bool

- name: Verify Nexus certificate renewal works
  ansible.builtin.command: certbot renew --dry-run
  become: true
  register: nexus_certbot_dry_run
  changed_when: false
  failed_when: nexus_certbot_dry_run.rc != 0
  when:
    - nexus_enable_https | bool
    - nexus_certbot_verify_renewal | bool

# ---- Retrieve initial Nexus admin password ----
- name: Get initial Nexus admin password from container
  ansible.builtin.command:
    cmd: docker exec nexus cat /nexus-data/admin.password
  become: true
  register: nexus_initial_admin_password
  changed_when: false
  ignore_errors: true

- name: Show initial Nexus admin password
  ansible.builtin.debug:
    msg: >
      Initial Nexus admin password: {{ nexus_initial_admin_password.stdout | default('N/A - may have been changed already') }}
      PLEASE SAVE THIS AND CHANGE IT IMMEDIATELY.
  when:
    - nexus_admin_password | length == 0
    - nexus_initial_admin_password.stdout | default('') | length > 0

- name: Select Nexus API password
  ansible.builtin.set_fact:
    nexus_api_password: >-
      {{
        nexus_admin_password
        if (nexus_admin_password | length > 0)
        else (nexus_initial_admin_password.stdout | default(''))
      }}
  no_log: true

- name: Validate Nexus API password is available
  ansible.builtin.assert:
    that:
      - nexus_api_password | length > 0
    fail_msg: "Set nexus_admin_password after the initial Nexus admin password has been changed."

- name: Check Nexus authentication with the selected admin password
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ nexus_port }}/service/rest/v1/status"
    method: GET
    user: "{{ nexus_admin_username }}"
    password: "{{ nexus_api_password }}"
    force_basic_auth: true
    status_code: [200, 401, 403, 429]
  register: nexus_auth_check
  changed_when: false
  failed_when: false
  no_log: true

- name: Record Nexus authentication rate-limit wait time
  ansible.builtin.set_fact:
    nexus_auth_retry_after_seconds: >-
      {{
        [
          (nexus_auth_check.retry_after | default(0) | int) + (nexus_auth_rate_limit_buffer_seconds | int),
          nexus_auth_rate_limit_min_wait_seconds | int
        ] | max
      }}
  when: nexus_auth_check.status | default(0) == 429

- name: Wait for Nexus authentication rate limiting to clear
  ansible.builtin.pause:
    seconds: "{{ nexus_auth_retry_after_seconds }}"
  when: nexus_auth_check.status | default(0) == 429

- name: Re-check Nexus authentication after waiting for rate limiting
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ nexus_port }}/service/rest/v1/status"
    method: GET
    user: "{{ nexus_admin_username }}"
    password: "{{ nexus_api_password }}"
    force_basic_auth: true
    status_code: [200, 401, 403, 429]
  register: nexus_auth_check_after_wait
  changed_when: false
  failed_when: false
  no_log: true
  when: nexus_auth_check.status | default(0) == 429

- name: Select effective Nexus authentication result
  ansible.builtin.set_fact:
    nexus_auth_check_status_effective: >-
      {{
        nexus_auth_check_after_wait.status
        if (nexus_auth_check_after_wait is defined and nexus_auth_check_after_wait.status is defined)
        else nexus_auth_check.status
      }}
    nexus_auth_retry_after_effective: >-
      {{
        nexus_auth_check_after_wait.retry_after
        if (nexus_auth_check_after_wait is defined and nexus_auth_check_after_wait.retry_after is defined)
        else (nexus_auth_check.retry_after | default(900))
      }}
  no_log: true

- name: Fail when Nexus authentication is not ready
  ansible.builtin.fail:
    msg: >-
      Nexus REST authentication returned HTTP {{ nexus_auth_check_status_effective | default('unknown') }}.
      {% if nexus_admin_password | length == 0 %}
      The initial /nexus-data/admin.password value is no longer accepted. Set nexus_admin_password to the current admin password before rerunning this role.
      {% else %}
      Set nexus_admin_password to the current admin password before rerunning this role.
      {% endif %}
      If Nexus is temporarily rate-limited, wait {{ nexus_auth_retry_after_effective | default(nexus_auth_rate_limit_min_wait_seconds) }} seconds before trying again.
  when: nexus_auth_check_status_effective | default(0) | int != 200

# ---- Check existing blob stores and repos ----
- name: Check existing blob stores
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ nexus_port }}/service/rest/v1/blobstores"
    method: GET
    user: "{{ nexus_admin_username }}"
    password: "{{ nexus_api_password }}"
    force_basic_auth: true
    return_content: true
  register: existing_blobstores
  retries: 10
  delay: 10
  until: existing_blobstores.status == 200
  no_log: true

- name: Check existing repositories
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ nexus_port }}/service/rest/v1/repositories"
    method: GET
    user: "{{ nexus_admin_username }}"
    password: "{{ nexus_api_password }}"
    force_basic_auth: true
    return_content: true
  register: existing_repos
  retries: 10
  delay: 10
  until: existing_repos.status == 200
  no_log: true

# ---- Docker blob store ----
- name: Create Docker blob store
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ nexus_port }}/service/rest/v1/blobstores/file"
    method: POST
    user: "{{ nexus_admin_username }}"
    password: "{{ nexus_api_password }}"
    force_basic_auth: true
    body_format: json
    body:
      name: "{{ nexus_docker_blob }}"
      path: "{{ nexus_docker_blob }}"
    status_code: [200, 201, 204]
  when: nexus_docker_blob not in (existing_blobstores.json | map(attribute='name') | list)
  retries: 5
  delay: 10
  until: create_docker_blob.status | default(0) in [200, 201, 204]
  register: create_docker_blob
  no_log: true

- name: Update Docker blob store
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ nexus_port }}/service/rest/v1/blobstores/file/{{ nexus_docker_blob }}"
    method: PUT
    user: "{{ nexus_admin_username }}"
    password: "{{ nexus_api_password }}"
    force_basic_auth: true
    body_format: json
    body:
      name: "{{ nexus_docker_blob }}"
      path: "{{ nexus_docker_blob }}"
    status_code: [200, 201, 204]
  when: nexus_docker_blob in (existing_blobstores.json | map(attribute='name') | list)
  retries: 5
  delay: 10
  until: update_docker_blob.status | default(0) in [200, 201, 204]
  register: update_docker_blob
  no_log: true

# ---- Helm blob store ----
- name: Create Helm blob store
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ nexus_port }}/service/rest/v1/blobstores/file"
    method: POST
    user: "{{ nexus_admin_username }}"
    password: "{{ nexus_api_password }}"
    force_basic_auth: true
    body_format: json
    body:
      name: "{{ nexus_helm_blob }}"
      path: "{{ nexus_helm_blob }}"
    status_code: [200, 201, 204]
