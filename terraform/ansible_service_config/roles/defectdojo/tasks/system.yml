---
- name: Create defectdojo system group
  ansible.builtin.group:
    name: "{{ defectdojo_group }}"
    system: true
    state: present

- name: Create defectdojo system user
  ansible.builtin.user:
    name: "{{ defectdojo_user }}"
    group: "{{ defectdojo_group }}"
    system: true
    shell: /bin/bash
    home: "{{ defectdojo_install_dir }}"
    create_home: true
    state: present

- name: Ensure install directory exists with correct ownership
  ansible.builtin.file:
    path: "{{ defectdojo_install_dir }}"
    state: directory
    owner: "{{ defectdojo_user }}"
    group: "{{ defectdojo_group }}"
    mode: "0755"
