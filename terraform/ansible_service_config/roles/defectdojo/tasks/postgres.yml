---
- name: Ensure PostgreSQL is started and enabled
  ansible.builtin.service:
    name: postgresql
    state: started
    enabled: true

- name: Create DefectDojo PostgreSQL user
  become_user: postgres
  community.postgresql.postgresql_user:
    name: "{{ defectdojo_db_user }}"
    password: "{{ defectdojo_db_password }}"
    state: present
  no_log: true

- name: Create DefectDojo PostgreSQL database
  become_user: postgres
  community.postgresql.postgresql_db:
    name: "{{ defectdojo_db_name }}"
    owner: "{{ defectdojo_db_user }}"
    encoding: UTF8
    lc_collate: en_US.UTF-8
    lc_ctype: en_US.UTF-8
    template: template0
    state: present

- name: Grant database privileges to DefectDojo user
  become_user: postgres
  community.postgresql.postgresql_privs:
    login_db: "{{ defectdojo_db_name }}"
    roles: "{{ defectdojo_db_user }}"
    privs: ALL
    type: database
    state: present

- name: Grant public schema privileges to DefectDojo user
  become_user: postgres
  community.postgresql.postgresql_privs:
    login_db: "{{ defectdojo_db_name }}"
    roles: "{{ defectdojo_db_user }}"
    privs: ALL
    type: schema
    objs: public
    state: present
