[defaults]
inventory = inventories/dev/hosts.ini
roles_path = roles
host_key_checking = False
retry_files_enabled = False
stdout_callback = default
callback_result_format = yaml
remote_tmp = /tmp/.ansible-${USER}/tmp
become = True
become_method = sudo
become_user = root
become_flags = -n

[ssh_connection]
pipelining = True
